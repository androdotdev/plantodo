name: Pullfrog
run-name: Pullfrog review on PR #${{ github.event.pull_request.number }}
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Check lockfile freshness
        run: |
          PKG_VER=$(node -p "require('./cli/package.json').version")
          LOCK_VER=$(node -p "require('./bun.lock').packages?.cli?.version || 'unknown'" 2>/dev/null || echo "unknown")
          if [ "$LOCK_VER" != "unknown" ] && [ "$LOCK_VER" != "$PKG_VER" ]; then
            echo "❌ Lockfile version ($LOCK_VER) doesn't match package.json ($PKG_VER)"
            exit 1
          fi
          echo "✅ Lockfile matches package.json"
      - name: Run agent
        uses: pullfrog/pullfrog@v0
        with:
          prompt: "${{ inputs.prompt || 'You are a strict code reviewer. Review the PR diff thoroughly. REQUEST CHANGES if you find: version/lockfile staleness, security issues, bugs, missing error handling, or improper patterns. Do NOT approve until all real issues are addressed. Be strict but fair \u2014 minor style nits are not blockers.' }}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY:
            ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
